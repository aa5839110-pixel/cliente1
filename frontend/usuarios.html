<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adicionar Usuário</title>
<link rel="stylesheet" href="usuarios.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<header>
<h1>Cadastro de Usuários</h1>
<p>Crie novos acessos para o sistema</p>
</header>

<main class="box">

<i class="fa fa-user-plus topo-icon"></i>

<form id="userForm">

<input type="text" id="name" placeholder="Nome" required>

<input type="email" id="email" placeholder="Email" required>

<input type="password" id="password" placeholder="Senha" required>

<select id="isAdmin">
  <option value="false">Usuário comum</option>
  <option value="vendedor">Vendedor externo</option>
  <option value="true">Administrador</option>
</select>

<button type="submit">Criar Usuário</button>

</form>

<p id="status"></p>

<a href="administracao.html" class="voltar">← Voltar</a>

</main>

<script src="usuarios.js"></script>

</body>
</html>
