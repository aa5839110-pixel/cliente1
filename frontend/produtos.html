<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo de Produtos</title>
<link rel="stylesheet" href="produtos.css">
</head>

<body>

<div id="welcomeScreen">
  <h1>👋 Bem-vindo</h1>
  <p>Carregando catálogo...</p>
</div>

<header>
  <h1>📦 Catálogo de Produtos</h1>

  <div class="top-buttons">
    <a href="painel.html">Painel Admin</a>
    <a href="promocoe.html" class="promocoes-btn">🔥 Promoções</a>
    <a href="orcamento.html" class="top-btn destaque">🧾 Orçamentos</a>

  </div>
</header>

<div id="notificacoes"></div>

<section class="top-vendas">
   <h2>🏆 Mais Vendidos</h2>
   <div id="topSales"></div>
</section>

<section class="filtros">
  <input type="text" id="busca" placeholder="Buscar nome ou ID...">
  
  <select id="categoriaFiltro">
    <option value="">Todas categorias</option>
  </select>
</section>

<div class="products-container" id="productsContainer"></div>

<!-- Modal -->
<div id="modal" class="modal">
  <div class="modal-content">

    <span id="fecharModal" class="close">&times;</span>

    <img id="modalImage" class="modal-img">

    <form id="editarProdutoForm">

      <input type="hidden" id="modalId">

      <label>Nome</label>
      <input type="text" id="modalName">

      <label>Descrição</label>
      <textarea id="modalDescription"></textarea>

      <label>Tabela 1</label>
      <input type="number" id="modalPrice1">

      <label>Tabela 2</label>
      <input type="number" id="modalPrice2">

      <label>Estoque</label>
      <input type="number" id="modalStock">

      <label>Categoria</label>
      <input type="text" id="modalCategory">

      <label>Imagem</label>
      <input type="text" id="modalImageURL">

      <div class="modal-buttons">
        <button type="submit" class="save">💾 Salvar</button>
        <button type="button" id="excluirProduto" class="delete">🗑️ Excluir</button>
      </div>

    </form>

  </div>
</div>

<script src="produtos.js"></script>

</body>
</html>
