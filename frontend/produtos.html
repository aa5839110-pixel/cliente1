<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Catálogo de Produtos</title>

<link rel="stylesheet" href="produtos.css">
</head>

<body>

<!-- SPLASH -->
<div id="welcomeScreen">
  <h1>👋 Bem-vindo</h1>
  <p>Carregando catálogo...</p>
</div>

<!-- TOPO -->
<header>

  <h1>📦 Catálogo de Produtos</h1>

  <div class="top-buttons">

    <a href="painel.html">
      Painel Admin
    </a>

    <a href="promocoe.html" class="promocoes-btn">
      🔥 Promoções
    </a>

    <a href="orcamento.html" class="top-btn destaque">
      🧾 Orçamentos
    </a>

  </div>

</header>

<!-- NOTIFICAÇÕES -->
<div id="notificacoes"></div>

<!-- TOP VENDAS -->
<section class="top-vendas">

  <h2>🏆 Mais Vendidos</h2>

  <div id="topSales"></div>

</section>

<!-- FILTROS -->
<section class="filtros">

  <input
    type="text"
    id="busca"
    placeholder="Buscar nome ou ID..."
  >

  <select id="categoriaFiltro">
    <option value="">
      Todas categorias
    </option>
  </select>

</section>

<!-- PRODUTOS -->
<div
  class="products-container"
  id="productsContainer"
></div>

<!-- =========================
     MODAL EDIÇÃO
========================= -->
<div id="modal" class="modal">

  <div class="modal-content">

    <span
      id="fecharModal"
      class="close"
    >
      &times;
    </span>

    <img
      id="modalImage"
      class="modal-img"
      src=""
    >

    <form id="editarProdutoForm">

      <input
        type="hidden"
        id="modalId"
      >

      <label>Nome</label>
      <input
        type="text"
        id="modalName"
      >

      <label>Descrição</label>
      <textarea
        id="modalDescription"
      ></textarea>

      <label>Tabela 1</label>
      <input
        type="number"
        id="modalPrice1"
      >

      <label>Tabela 2</label>
      <input
        type="number"
        id="modalPrice2"
      >

      <label>Estoque</label>
      <input
        type="number"
        id="modalStock"
      >

      <label>Categoria</label>
      <input
        type="text"
        id="modalCategory"
      >

      <label>Imagem Principal</label>
      <input
        type="text"
        id="modalImageURL"
      >

      <div class="modal-buttons">

        <button
          type="submit"
          class="save"
        >
          💾 Salvar
        </button>

        <button
          type="button"
          id="excluirProduto"
          class="delete"
        >
          🗑️ Excluir
        </button>

      </div>

    </form>

  </div>

</div>

<!-- =========================
     MODAL VISUALIZAÇÃO
========================= -->
<div
  id="visualizarModal"
  class="visualizar-modal"
>

  <div class="visualizar-content">

    <span
      id="fecharVisualizar"
      class="close"
    >
      &times;
    </span>

    <img
      id="imagemPrincipal"
      class="imagem-principal"
      src=""
      alt="Produto"
    >

    <div
      id="miniaturas"
      class="miniaturas"
    ></div>

  </div>

</div>

<script src="produtos.js"></script>

</body>
</html>
